name: Native Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Enter compilation version number (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            platform: windows
            binary: pow.exe
            output: pow-windows-x64.exe
          - os: windows-11-arm
            platform: windows
            binary: pow.exe
            output: pow-windows-arm64.exe
          - os: macos-15-intel
            platform: macos
            binary: pow
            output: pow-macos-x64
          - os: macos-15
            platform: macos
            binary: pow
            output: pow-macos-arm64
          - os: ubuntu-26.04
            platform: linux
            binary: pow
            output: pow-linux-x64
          - os: ubuntu-26.04-arm
            platform: linux
            binary: pow
            output: pow-linux-arm64
          - os: ubuntu-24.04-riscv
            platform: linux
            binary: pow
            output: pow-linux-riscv64
          - os: ubuntu-latest
            platform: linux-cross
            target: s390x-unknown-linux-gnu
            binary: pow
            output: pow-linux-s390x
          - os: ubuntu-latest
            platform: linux-cross
            target: powerpc64le-unknown-linux-gnu
            binary: pow
            output: pow-linux-ppc64le

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      # 统一安装目标工具链，如果是 cross 架构则安装对应的 target
      - name: Install rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      # 针对交叉编译架构安装 cross 工具
      - name: Install cross
        if: matrix.platform == 'linux-cross'
        run: cargo install cross

      - name: Build Binary (Native)
        if: matrix.platform != 'linux-cross'
        run: cargo build --release

      - name: Build Binary (Cross)
        if: matrix.platform == 'linux-cross'
        run: cross build --target ${{ matrix.target }} --release

      - name: Package Unix
        if: matrix.platform == 'linux'
        run: mv target/release/${{ matrix.binary }} ./${{ matrix.output }}

      - name: Package Cross
        if: matrix.platform == 'linux-cross'
        run: mv target/${{ matrix.target }}/release/${{ matrix.binary }} ./${{ matrix.output }}

      - name: Package Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Move-Item target/release/${{ matrix.binary }} ./${{ matrix.output }}

      - name: Upload Single File
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output }}-${{ github.event.inputs.version }}
          path: ${{ matrix.output }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v7

      - name: Download All Artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./downloads

      - name: Organize Files
        run: |
          mkdir ./release_assets
          find ./downloads -type f -exec cp {} ./release_assets/ \;
          ls -R ./release_assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ github.event.inputs.version }}" ./release_assets/* \
            --title "Release v${{ github.event.inputs.version }}" \
            --notes "Automated native binaries built via GitHub Actions." \
            --target ${{ github.sha }}
