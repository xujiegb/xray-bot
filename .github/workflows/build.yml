name: Native Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Enter compilation version number (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            platform: windows
            binary: pow.exe
            output: pow-windows-x64.exe
          - os: windows-11-arm
            platform: windows
            binary: pow.exe
            output: pow-windows-arm64.exe
          - os: macos-15-intel
            platform: macos
            binary: pow
            output: pow-macos-x64
          - os: macos-15
            platform: macos
            binary: pow
            output: pow-macos-arm64
          - os: ubuntu-26.04
            platform: linux
            binary: pow
            output: pow-linux-x64
          - os: ubuntu-26.04-arm
            platform: linux
            binary: pow
            output: pow-linux-arm64
          - os: ubuntu-24.04-riscv
            platform: linux
            binary: pow
            output: pow-linux-riscv64
          # 使用 cross 容器交叉编译的架构
          - os: ubuntu-26.04
            platform: linux
            binary: pow
            output: pow-linux-s390x
            target: s390x-unknown-linux-gnu
            use-cross: true
          - os: ubuntu-26.04
            platform: linux
            binary: pow
            output: pow-linux-ppc64le
            target: powerpc64le-unknown-linux-gnu
            use-cross: true
          # 使用宿主机交叉链编译的架构（解决 cross 无 loongarch64 镜像的问题）
          - os: ubuntu-26.04
            platform: linux
            binary: pow
            output: pow-linux-loong64
            target: loongarch64-unknown-linux-gnu
            use-loongarch-cross: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      # 仅针对 loongarch64 安装对应的 Rust target 和 Ubuntu 交叉编译器
      - name: Install LoongArch64 Toolchain
        if: matrix.use-loongarch-cross == true
        run: |
          rustup target add ${{ matrix.target }}
          sudo apt-get update
          sudo apt-get install -y gcc-loongarch64-linux-gnu

      # 仅在 s390x 和 ppc64le 架构上安装 cross 工具
      - name: Install Cross Tool
        if: matrix.use-cross == true
        run: |
          dir=$(mktemp -d)
          curl -sSLo- https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz | tar -xzf - -C "$dir"
          echo "$dir" >> $GITHUB_PATH

      # 1. 原生编译步骤（保持不动）
      - name: Build Binary
        if: matrix.use-cross != true && matrix.use-loongarch-cross != true
        run: cargo build --release

      # 2. 容器交叉编译步骤（用于 s390x / ppc64le）
      - name: Build Binary (Cross)
        if: matrix.use-cross == true
        run: cross build --target ${{ matrix.target }} --release

      # 3. 宿主机交叉编译步骤（用于 loongarch64，并指定连接器）
      - name: Build Binary (LoongArch Cross)
        if: matrix.use-loongarch-cross == true
        env:
          CARGO_TARGET_LOONGARCH64_UNKNOWN_LINUX_GNU_LINKER: loongarch64-linux-gnu-gcc
        run: cargo build --target ${{ matrix.target }} --release

      # 原生 Unix 架构打包（路径为 target/release）
      - name: Package Unix
        if: matrix.platform != 'windows' && matrix.use-cross != true && matrix.use-loongarch-cross != true
        run: mv target/release/${{ matrix.binary }} ./${{ matrix.output }}

      # 交叉编译 Unix 架构打包（路径均包含 target/${{ matrix.target }}/release）
      - name: Package Unix (Cross & Host-Cross)
        if: matrix.platform != 'windows' && (matrix.use-cross == true || matrix.use-loongarch-cross == true)
        run: mv target/${{ matrix.target }}/release/${{ matrix.binary }} ./${{ matrix.output }}

      - name: Package Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Move-Item target/release/${{ matrix.binary }} ./${{ matrix.output }}

      - name: Upload Single File
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output }}-${{ github.event.inputs.version }}
          path: ${{ matrix.output }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v7

      - name: Download All Artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./downloads

      - name: Organize Files
        run: |
          mkdir ./release_assets
          find ./downloads -type f -exec cp {} ./release_assets/ \;
          ls -R ./release_assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ github.event.inputs.version }}" ./release_assets/* \
            --title "Release v${{ github.event.inputs.version }}" \
            --notes "Automated native binaries built via GitHub Actions." \
            --target ${{ github.sha }}
